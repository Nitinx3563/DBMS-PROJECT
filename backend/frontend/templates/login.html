{% extends "layout.html" %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;" class="glass">
    <h2 class="text-center" style="margin-bottom: 2rem;">Sign In to DriveDeal</h2>
    <form method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    <p class="text-center" style="margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary);">Register here</a>
    </p>
</div>
{% endblock %}
