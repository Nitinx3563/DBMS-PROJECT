{% extends "layout.html" %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;" class="glass">
    <h2 class="text-center" style="margin-bottom: 2rem;">Create Your Account</h2>
    <form method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="+1 234 567 890">
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" placeholder="City, State">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="both">Buyer & Seller</option>
                <option value="buyer">Buyer only</option>
                <option value="seller">Seller only</option>
            </select>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    <p class="text-center" style="margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary);">Login</a>
    </p>
</div>
{% endblock %}
