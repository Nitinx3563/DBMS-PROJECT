{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 2rem auto;">
    <h1 style="margin-bottom: 2rem;">List Your Car for Sale</h1>

    <form method="POST" class="glass">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <!-- Basic Info -->
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" required placeholder="e.g. Toyota">
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" name="model" required placeholder="e.g. Camry">
            </div>
            <div class="form-group">
                <label>Year</label>
                <input type="number" name="year" required placeholder="2020">
            </div>
            <div class="form-group">
                <label>Fuel Type</label>
                <select name="fuel_type">
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="CNG">CNG</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mileage (in km)</label>
                <input type="number" name="mileage" required placeholder="50000">
            </div>
            <div class="form-group">
                <label>Color</label>
                <input type="text" name="color" placeholder="Silver">
            </div>

            <!-- Specs -->
            <div class="form-group">
                <label>Engine</label>
                <input type="text" name="engine" placeholder="2.5L 4-cylinder">
            </div>
            <div class="form-group">
                <label>Transmission</label>
                <select name="transmission">
                    <option value="Automatic">Automatic</option>
                    <option value="Manual">Manual</option>
                </select>
            </div>
            <div class="form-group">
                <label>Seats</label>
                <input type="number" name="seats" value="5">
            </div>
            <div class="form-group">
                <label>Condition</label>
                <select name="condition">
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>
        </div>

        <div class="form-group mt-2">
            <label style="font-size: 1.2rem; color: var(--primary);">Listing Price ($)</label>
            <input type="number" name="price" required placeholder="15000"
                style="font-size: 1.5rem; font-weight: 800; border-color: var(--primary);">
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">
                * System will provide a predicted price estimate after submission based on similar models.
            </p>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem;">Post
            Listing</button>
    </form>
</div>
{% endblock %}
